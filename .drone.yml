kind: pipeline
name: release
type: docker
platform:
  os: linux
  arch: arm64
trigger:
  branch:
    - main
  ref:
    exclude:
      - refs/tags/*

steps:
  - name: Semanticially Version packages based on affected changes
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:1.1.0
    volumes:
      - name: cache
        path: /tmp/npm_cache
    environment:
      NPM_REGISTRY_PROTO: https
      NPM_REGISTRY: verdaccio.nas.local.abbottland.io
      NPM_TOKEN:
        from_secret: NPM_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      NX_BASE: last-release
      NX_HEAD: origin/main
    commands:
    - git config --global user.name "Brandon Abbott"
    - git config --global user.email "pbabbott@gmail.com"
    - git remote set-url origin https://$GITHUB_TOKEN@github.com/pbabbott/home-web-apps
    - yarn config set cache-folder /tmp/npm_cache
    - yarn --frozen-lockfile
    - yarn cache dir
    - nx affected --target version 

image_pull_secrets:
  - REG_CRED

volumes:
  - name: cache
    host:
      path: /var/lib/cache

