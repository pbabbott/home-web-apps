kind: pipeline
name: release
type: docker
platform:
  os: linux
  arch: arm64
trigger:
  branch:
    - main
  ref:
    exclude:
      - refs/tags/*

steps:
  - name: Semanticially Version packages based on affected changes
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:1.1.0
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_REGISTRY_PROTO: https
      NPM_REGISTRY: verdaccio.nas.local.abbottland.io
      NPM_TOKEN:
        from_secret: NPM_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      NX_BASE: origin/main~1
      NX_HEAD: origin/main
      GOPRIVATE: github.com

    commands:
    # - git config --global url."git@github.com:".insteadOf "https://github.com/"
    - git config --global url."https://${GITHUB_TOKEN}:x-oauth-basic@github.com".insteadOf "https://github.com"
    - yarn config set cache-folder /tmp/yarn_cache
    - yarn --frozen-lockfile
    - nx run yaml-config:version --releaseAs=patch --verbose

image_pull_secrets:
  - REG_CRED

volumes:
  - name: yarn_cache
    host:
      path: /var/lib/cache/yarn
  - name: node_module_cache
    host:
      path: /var/lib/cache/node_modules

