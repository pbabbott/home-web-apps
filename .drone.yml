kind: pipeline
name: ci
type: docker
platform:
  os: linux
  arch: arm64

trigger:
  branch:
    - "*"
  ref:
    exclude:
      - refs/tags/*

environment:
    NPM_REGISTRY: verdaccio.nas.local.abbottland.io
    NPM_REGISTRY_PROTO: https

steps:
  - name: git fetch
    image: alpine/git
    commands:
      - git fetch --tags

  - name: Restore packages with Yarn
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
    commands:
      - yarn config set cache-folder /tmp/yarn_cache
      - yarn --frozen-lockfile

  - name: Run Build
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
    commands:
      - nx affected --target build --base=origin/main

  - name: Container Builds
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
      - name: docker_daemon
        path: /var/run/docker.sock
    environment:
      # As per the troubleshooting guide on github: nx-tools/nx-container
      CI_CONTEXT_FALLBACK_TO_LOCAL: true
      NPM_TOKEN:
        from_secret: NPM_TOKEN
    commands:
      - nx affected --target container --base=origin/main --verbose

  - name: Run Tests
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    commands:
      - nx affected --target test --base=origin/main

volumes:
  - name: yarn_cache
    host:
      path: /var/lib/cache/yarn
  - name: node_module_cache
    host:
      path: /var/lib/cache/node_modules
  - name: docker_daemon
    host:
      path: /var/run/docker.sock

image_pull_secrets:
  - REG_CRED

---

kind: pipeline
name: release
type: docker

depends_on:
  - ci

platform:
  os: linux
  arch: arm64

trigger:
  branch:
    - main
  ref:
    exclude:
      - refs/tags/*

environment:
  NPM_REGISTRY: verdaccio.nas.local.abbottland.io
  NPM_REGISTRY_PROTO: https

steps:
  - name: Restore packages with Yarn
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
    commands:
      - yarn config set cache-folder /tmp/yarn_cache
      - yarn --frozen-lockfile
          
  - name: Semantically Version packages based on affected changes
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - git remote remove origin
      - git remote add origin https://$GITHUB_TOKEN@github.com/pbabbott/home-web-apps
      - git fetch --tags
      - nx affected --target=version --base=refs/tags/last-release --head=origin/main --parallel=false
      - git tag -f last-release
      - git push origin last-release --force

image_pull_secrets:
  - REG_CRED

volumes:
  - name: yarn_cache
    host:
      path: /var/lib/cache/yarn
  - name: node_module_cache
    host:
      path: /var/lib/cache/node_modules

---
kind: pipeline
name: docker-registry-publish
type: docker

platform:
  os: linux
  arch: arm64

trigger:
  ref:
    - refs/tags/config-backup-service-*

environment:
  NPM_REGISTRY: verdaccio.nas.local.abbottland.io
  NPM_REGISTRY_PROTO: https

steps:
  - name: Restore packages with Yarn
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
    commands:
      - yarn config set cache-folder /tmp/yarn_cache
      - yarn --frozen-lockfile
          
  - name: Push docker containers to registry
    image: registry.nas.local.abbottland.io/drone-node-gh-cli:2.1
    volumes:
      - name: yarn_cache
        path: /tmp/yarn_cache
      - name: node_module_cache
        path: /drone/src/node_modules
      - name: docker_daemon
        path: /var/run/docker.sock
    environment:
      CI_CONTEXT_FALLBACK_TO_LOCAL: true
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
      NPM_TOKEN:
        from_secret: NPM_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - git fetch --tags
      - echo "$REGISTRY_PASSWORD" | docker login -u pbabbott --password-stdin registry.nas.local.abbottland.io
      - nx run-many -t container --configuration=push

image_pull_secrets:
  - REG_CRED

volumes:
  - name: yarn_cache
    host:
      path: /var/lib/cache/yarn
  - name: node_module_cache
    host:
      path: /var/lib/cache/node_modules
  - name: docker_daemon
    host:
      path: /var/run/docker.sock
