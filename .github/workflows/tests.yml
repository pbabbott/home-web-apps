name: Tests
on:
  workflow_dispatch: {}
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
permissions:
  checks: write
  pull-requests: write
jobs:
  ui-tests:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.ref }}-
            playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            playwright-${{ runner.os }}-

      - name: Install playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
        working-directory: packages/fui-components
        shell: bash

      - name: Run ui tests
        run: pnpm test:ui
        shell: bash

  unit-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Run unit tests
        run: pnpm test:unit
        shell: bash

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: Unit Tests
          path: |
            **/test-results/test-results.xml
            !**/node_modules/**
          reporter: jest-junit

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: (!cancelled())
        with:
          check_name: 'Unit Test Results'
          files: |
            **/test-results/test-results.xml

  integration-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          op-connect-host: https://op-connect.local.abbottland.io
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Run dev dependencies
        run: pnpm dev:deps
        shell: bash

      - name: Run integration tests
        run: pnpm test:int
        shell: bash

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: (!cancelled())
        with:
          check_name: 'Integration Test Results'
          files: |
            **/test-results/test-results.xml

      - name: Stop dev dependencies
        if: always()
        run: pnpm dev:deps:down
        shell: bash

  e2e-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build
        uses: ./.github/actions/install-and-build

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          op-connect-host: https://op-connect.local.abbottland.io
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Run e2e dependencies build
        run: pnpm e2e:deps:build
        shell: bash

      - name: Run e2e dependencies
        run: pnpm e2e:deps
        shell: bash

      - name: Run e2e tests
        run: pnpm test:e2e
        shell: bash

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: (!cancelled())
        with:
          check_name: 'E2E Test Results'
          files: |
            **/test-results/test-results.xml

      - name: Stop e2e dependencies
        if: always()
        run: pnpm e2e:deps:down
        shell: bash
