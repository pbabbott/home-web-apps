name: Tests
on:
  workflow_dispatch: {}
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
permissions:
  checks: write
  pull-requests: write
jobs:
  ui-tests:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.ref_name }}-
            playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            playwright-${{ runner.os }}-

      - name: Install playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
        working-directory: packages/fui-components
        shell: bash

      - name: Run ui tests
        run: pnpm test:ui
        shell: bash

  unit-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Run unit tests
        run: pnpm test:unit
        shell: bash
        env:
          CI: true

      - name: Publish test results
        uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          artifact-name: unit-test-results
          report-name: Unit Tests

  integration-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build composite action
        uses: ./.github/actions/install-and-build

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          op-connect-host: https://op-connect.local.abbottland.io
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Run dev dependencies
        run: pnpm dev:deps
        shell: bash

      - name: Run integration tests
        run: pnpm test:int
        shell: bash
        env:
          CI: true

      - name: Publish test results
        uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          artifact-name: integration-test-results
          report-name: Integration Tests

      - name: Stop dev dependencies
        if: always()
        run: pnpm dev:deps:down
        shell: bash

  e2e-tests:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm setup composite action
        uses: ./.github/actions/pnpm-setup

      - name: Install and build
        uses: ./.github/actions/install-and-build

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          op-connect-host: https://op-connect.local.abbottland.io
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Run e2e dependencies build
        run: pnpm e2e:deps:build
        shell: bash

      - name: Run e2e dependencies
        run: pnpm e2e:deps
        shell: bash

      - name: Run e2e tests
        run: pnpm test:e2e
        shell: bash
        env:
          CI: true

      - name: Collect test results
        if: ${{ !cancelled() }}
        run: |
          mkdir -p /tmp/e2e-test-results
          while IFS= read -r f; do
            pkg=$(dirname "$f" | sed 's|^\./||;s|/test-results$||;s|/|-|g')
            cp "$f" "/tmp/e2e-test-results/${pkg}.xml"
          done < <(find . -name "test-results.xml" -not -path "*/node_modules/*")
          echo "Collected $(ls /tmp/e2e-test-results/*.xml 2>/dev/null | wc -l) test result file(s)"
        shell: bash

      - name: Upload e2e test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-test-results
          path: /tmp/e2e-test-results/
          if-no-files-found: warn

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: E2E Tests
          artifact: e2e-test-results
          path: '*.xml'
          reporter: jest-junit

      - name: Stop e2e dependencies
        if: always()
        run: pnpm e2e:deps:down
        shell: bash
