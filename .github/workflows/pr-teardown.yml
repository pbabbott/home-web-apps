name: PR Teardown

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.number }}

jobs:
  teardown-preview:
    name: Teardown Preview
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Fetch kubeconfig from 1Password
        env:
          OP_CONNECT_HOST: https://op-connect.local.abbottland.io
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_PROD }}
        run: |
          op read "op://Homelab/nonprod-gen2 - pr-preview kubeconfig/kubeconfig" \
            > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> $GITHUB_ENV

      - name: Delete namespace
        run: |
          kubectl delete namespace pr-${{ env.PR_NUMBER }} \
            --ignore-not-found=true --wait=false
          echo "Namespace pr-${{ env.PR_NUMBER }} deletion initiated."
          echo "Cascade removes: Deployment, Service, HTTPRoute."
          echo "external-dns will delete the DNS record automatically."

      - name: Find existing PR comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.PR_NUMBER }}
          comment-author: github-actions[bot]
          body-includes: '<!-- pr-preview-comment -->'

      - name: Update PR comment
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: |
            <!-- pr-preview-comment -->
            ## Preview Environment — Torn Down

            The preview environment for this PR has been deleted.
          edit-mode: replace
