name: Lint Codebase
on:
  workflow_dispatch: {}
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

jobs:
  lint:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: ./.github/actions/pnpm-setup

      - name: Cache turbo build artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install
        shell: bash

      - name: Run PNPM Script
        run: pnpm lint
        shell: bash

  format:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: ./.github/actions/pnpm-setup

      - name: Install dependencies
        run: pnpm install
        shell: bash

      - name: Run PNPM Script
        run: pnpm format:check
        shell: bash
