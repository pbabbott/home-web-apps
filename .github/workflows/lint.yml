name: Lint Codebase
on:
  workflow_dispatch: {}
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

jobs:
  lint:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: ./.github/actions/pnpm-setup

      - name: Install and build
        uses: ./.github/actions/install-and-build

      - name: Run PNPM Script
        run: pnpm lint
        shell: bash

  format:
    runs-on: [prod-gen2-amd64-runner]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: ./.github/actions/pnpm-setup

      - name: Install and build
        uses: ./.github/actions/install-and-build
        with:
          run-build: 'false'

      - name: Run PNPM Script
        run: pnpm format:check
        shell: bash
