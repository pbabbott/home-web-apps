name: Playwright Runner Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/playwright-runner.Dockerfile

jobs:
  publish:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Docker Login
        run: bash ./scripts/docker-login.sh
        env:
          OP_CONNECT_HOST: https://op-connect.local.abbottland.io
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_PROD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file docker/playwright-runner.Dockerfile \
            --tag harbor.local.abbottland.io/library/playwright-runner:1.57 \
            --tag harbor.local.abbottland.io/library/playwright-runner:latest \
            --push \
            .
        shell: bash
