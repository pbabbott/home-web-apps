name: Docker Publish

on:
  push:
    branches:
      - main

jobs:
  docker-publish:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Docker Login
        run: bash ./scripts/docker-login.sh
        env:
          OP_CONNECT_HOST: https://op-connect.local.abbottland.io
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_PROD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag as production images
        run: bash ./scripts/docker-retag-prod.sh
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
