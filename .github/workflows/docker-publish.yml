name: Docker Publish
on:
  push:
    branches:
      - main
jobs:
  docker-publish:
    runs-on: [prod-gen2-dind-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/pnpm-setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Setup Turbo auth
        run: |
          . ./scripts/turbo-auth.sh
          echo "TURBO_TOKEN=$TURBO_TOKEN" >> $GITHUB_ENV
          echo "TURBO_API=$TURBO_API" >> $GITHUB_ENV
          echo "TURBO_TEAM=$TURBO_TEAM" >> $GITHUB_ENV
        shell: bash

      - name: Build
        run: pnpm build
        shell: bash

      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Docker Login
        run: bash ./scripts/docker-login.sh
        env:
          OP_CONNECT_HOST: https://op-connect.local.abbottland.io
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_PROD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push Docker images
        run: pnpm docker:publish
        shell: bash
