name: 'install and build'
description: 'A composite action to install dependencies and build'
inputs:
  run-build:
    description: 'Whether to run pnpm build after installing dependencies'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Setup pnpm and Node.js
      uses: ./.github/actions/pnpm-setup

    - name: Cache node_modules
      id: node-modules-cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: pnpm install --frozen-lockfile
      shell: bash
      env:
        NODE_ENV: development

    - name: Setup Turbo auth
      if: inputs.run-build == 'true'
      run: |
        . ./scripts/turbo-auth.sh
        echo "TURBO_TOKEN=$TURBO_TOKEN" >> $GITHUB_ENV
        echo "TURBO_API=$TURBO_API" >> $GITHUB_ENV
        echo "TURBO_TEAM=$TURBO_TEAM" >> $GITHUB_ENV
      shell: bash

    - name: Run PNPM Script
      if: inputs.run-build == 'true'
      run: pnpm build
      shell: bash
