name: 'pnpm setup'
description: 'A composite action to run pnpm setup'
runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      env:
        NODE_ENV: development

    - name: Run PNPM Script
      run: pnpm build
      shell: bash
