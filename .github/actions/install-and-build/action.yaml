name: 'pnpm setup'
description: 'A composite action to run pnpm setup'
runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: pnpm install
      shell: bash
      env:
        NODE_ENV: development

    - name: Cache turbo build artifacts
      uses: actions/cache@v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.ref_name }}-
          ${{ runner.os }}-turbo-

    - name: Run PNPM Script
      run: pnpm build
      shell: bash
