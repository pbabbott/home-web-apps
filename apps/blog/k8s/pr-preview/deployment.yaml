apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: pr-${PR_NUMBER}
  labels:
    app: blog
    ephemeral: 'true'
    pr-number: '${PR_NUMBER}'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: blog
          image: '${IMAGE}'
          env:
            - name: IMAGE_TAG
              value: '${IMAGE_TAG}'
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
